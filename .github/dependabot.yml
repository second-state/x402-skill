version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    groups:
      rust-dependencies:
        patterns:
          - "*"
    ignore:
      # Pinned to 1.x to match the transitive dep used by x402-chain-eip155.
      # Re-evaluate once upstream x402-rs upgrades to alloy 2.
      - dependency-name: "alloy-signer-local"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps):"
    groups:
      python-dependencies:
        patterns:
          - "*"
